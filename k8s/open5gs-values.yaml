# Configurație Open5GS pentru testbed licență
# Bazată pe structura chart-urilor open5gs-amf, open5gs-smf etc. (versiunea 2.2.0)

# MongoDB integrat
mongodb:
  enabled: true
  auth:
    enabled: false
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: latest
  persistence:
    enabled: false

# Populare DB cu UE-uri pentru testare (3 UE-uri)
populate:
  enabled: true
  initCommands:
    - open5gs-dbctl add_ue_with_slice 999700000000001 465B5CE8B199B49FAA5F0A2EE238A6BC E8ED289DEBA952E4283B54E88E6183CA internet 1 111111
    - open5gs-dbctl add_ue_with_slice 999700000000002 465B5CE8B199B49FAA5F0A2EE238A6BC E8ED289DEBA952E4283B54E88E6183CA internet 1 111111
    - open5gs-dbctl add_ue_with_slice 999700000000003 465B5CE8B199B49FAA5F0A2EE238A6BC E8ED289DEBA952E4283B54E88E6183CA internet 1 111111
# ===== 5G CORE — NF-uri active =====

amf:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  metrics:
    enabled: true
  # Expunem AMF NGAP prin NodePort 30412 (pentru UERANSIM)
  services:
    ngap:
      type: NodePort
      nodePorts:
        ngap: "30412"
  config:
    plmnList:
      - plmn_id:
          mcc: "999"
          mnc: "70"
        s_nssai:
          - sst: 1
            sd: "111111"
    taiList:
      - plmn_id:
          mcc: "999"
          mnc: "70"
        tac: [1, 2, 3]
    guamiList:
      - plmn_id:
          mcc: "999"
          mnc: "70"
        amf_id:
          region: 2
          set: 1

smf:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  metrics:
    enabled: true
  config:
    info:
      - s_nssai:
          - sst: 1
            sd: "111111"
            dnn:
              - internet
upf:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  metrics:
    enabled: true
  # Expunem UPF GTP-U prin NodePort 30100 (pentru flux user-plane UERANSIM)
  services:
    gtpu:
      type: NodePort
      nodePorts:
        gtpu: "30100"
  config:
    info:
      - s_nssai:
          - sst: 1
            sd: "111111"
            dnn:
              - internet

nrf:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  metrics:
    enabled: true

ausf:
