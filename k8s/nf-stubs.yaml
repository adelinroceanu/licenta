# === AMF Stub ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf-stub
  namespace: nf-stubs
  labels:
    app: amf-stub
    nf-type: amf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amf-stub
  template:
    metadata:
      labels:
        app: amf-stub
        nf-type: amf
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: stub
          image: nf-stub:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NF_TYPE
              value: "amf"
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: amf-stub
  namespace: nf-stubs
  labels:
    app: amf-stub
    nf-type: amf
spec:
  selector:
    app: amf-stub
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

